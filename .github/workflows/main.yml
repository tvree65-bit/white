name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        # تثبيت Android SDK يدوياً
        sudo apt-get update
        sudo apt-get install -y wget unzip
        
        # تحميل Android SDK Command Line Tools
        cd /usr/local
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        sudo unzip -q commandlinetools-linux-11076708_latest.zip
        sudo rm commandlinetools-linux-11076708_latest.zip
        sudo mkdir -p android-sdk/cmdline-tools
        sudo mv cmdline-tools android-sdk/cmdline-tools/latest
        
        # تعيين المتغيرات
        echo "ANDROID_HOME=/usr/local/android-sdk" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        
        # قبول التراخيص
        yes | sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # تثبيت الإصدارات المطلوبة
        sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Verify AAPT2
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "Checking for aapt2:"
        find $ANDROID_HOME -name "aapt2" 2>/dev/null
        ls -la $ANDROID_HOME/build-tools/34.0.0/ || echo "Build tools 34.0.0 not found"

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build AAB
      run: ./gradlew bundleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/bundle/release/*.aab
