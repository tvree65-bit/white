name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        cd /usr/local
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        sudo unzip commandlinetools-linux-9477386_latest.zip
        sudo rm commandlinetools-linux-9477386_latest.zip
        sudo mkdir -p /usr/local/android-sdk/cmdline-tools
        sudo mv cmdline-tools /usr/local/android-sdk/cmdline-tools/latest
        echo "y" | sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"
        echo "ANDROID_HOME=/usr/local/android-sdk" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build AAB
      run: ./gradlew bundleRelease --stacktrace
    
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release.aab
        path: app/build/outputs/bundle/release/app-release.aab
