name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        # تثبيت الإصدارات المطلوبة
        yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        # تحقق من التثبيت
        echo "=== Build Tools 34.0.0 ==="
        ls -la $ANDROID_HOME/build-tools/34.0.0/ || echo "NOT FOUND"
        echo "=== Android SDK Path ==="
        echo $ANDROID_HOME

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Check Gradle version
      run: ./gradlew --version

    - name: Build AAB with full logs
      run: |
        ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build.log
        echo "=== BUILD COMPLETED ==="

    - name: Check for AAB file
      run: |
        echo "=== Searching for AAB files ==="
        find app/build -name "*.aab" 2>/dev/null || echo "No AAB found"
        echo "=== Build outputs directory ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload AAB
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/bundle/release/*.aab
