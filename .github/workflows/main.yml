name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install SDK components
      run: |
        echo "y" | sdkmanager "platforms;android-34" "build-tools;35.0.0" "platform-tools"
        sdkmanager --list | grep -E "build-tools|platforms"
    
    - name: Accept licenses
      run: yes | sdkmanager --licenses
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build AAB
      run: ./gradlew bundleRelease --stacktrace
    
    - name: List output files
      run: |
        echo "Checking for AAB file:"
        find app/build -name "*.aab" 2>/dev/null || echo "No AAB found"
        echo "Checking build outputs:"
        ls -la app/build/outputs/ || echo "No outputs directory"
        ls -la app/build/outputs/bundle/ 2>/dev/null || echo "No bundle directory"
    
    - name: Upload AAB
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: |
          app/build/outputs/bundle/release/*.aab
          app/build/outputs/apk/release/*.apk
