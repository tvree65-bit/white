name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 35.0.0
    
    - name: Accept Android Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Verify SDK Installation
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "Build Tools 35.0.0 files:"
        ls -la $ANDROID_HOME/build-tools/35.0.0/ | head -10
        echo "Checking for aapt2:"
        find $ANDROID_HOME -name "aapt2" 2>/dev/null || echo "aapt2 not found"
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build AAB
      run: |
        ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build.log
    
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/bundle/release/app-release.aab
    
    - name: Upload Build Log (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
