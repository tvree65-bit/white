name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        # تأكد من وجود أدوات SDK
        sdkmanager --list | head -20
        # تثبيت الإصدارات المطلوبة (الأكثر شيوعاً)
        yes | sdkmanager "platforms;android-33" "build-tools;30.0.3" "platform-tools"

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build AAB
      run: ./gradlew bundleRelease --stacktrace

    - name: List build outputs
      run: |
        echo "Checking for AAB file:"
        find . -name "*.aab" 2>/dev/null || echo "No AAB found"
        echo "Build outputs directory:"
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"

    - name: Upload AAB (if found)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/bundle/release/*.aab
